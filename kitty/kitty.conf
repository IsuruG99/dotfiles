# Font – pick one you like; JetBrains Mono or FiraCode are solid for code
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 14.0

# Ligatures (good for code, disable if distracting)
font_features JetBrainsMono-Regular +cv01 +cv02 +ss01 +ss02 +ss03 +ss04 +ss05 +zero

# Minimal padding, clean look
window_padding_width 2 4 
single_window_margin_width 0

# Subtle transparency (adjust 0.0–1.0; 0.9 = almost opaque)
background_opacity 0.75

# Cursor – block for normal, beam in insert (nvim friendly)
cursor_shape block
cursor_beam_thickness 1.5
cursor_underline_thickness 2

# Scrollback
scrollback_lines 10000

# Mouse – minimal interference
mouse_hide_wait 3.0
copy_on_select clipboard

# Misc – clean, no tabs/borders clutter
tab_bar_style hidden
# active_tab_foreground 
# active_tab_background 


# BEGIN_KITTY_THEME
# Terafox
include current-theme.conf
# END_KITTY_THEME
